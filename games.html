<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Earn Stars | Mines</title>

<link rel="stylesheet"
href="games.css">

</head>

<body>

<div class="bg"></div>

<div class="container">

<header class="top-bar">

<button
class="back-btn"
onclick="history.back()">

←

</button>

<h2 class="title">

💣 لعبة الألغام

</h2>

<div class="balance">

<span id="balanceValue">

0

</span>

<span>

⭐

</span>

</div>

</header>

<div class="game-card">

<div class="input-box">

<label>

قيمة الرهان

</label>

<input
type="number"
id="bet"
value="10"
min="1">

</div>

<div class="input-box">

<label>

عدد الألغام

</label>

<select id="mines">

<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>

</select>

</div>

<div class="game-stats">

<div>

<p>

المضاعف

</p>

<h3 id="multiplier">

1.00x

</h3>

</div>

<div>

<p>

الربح

</p>

<h3 id="profit">

0

</h3>

</div>

</div>

<div class="buttons">

<button
class="start-btn"
onclick="startGame()">

ابدأ اللعبة

</button>

<button
class="cash-btn"
onclick="cashOut()">

سحب الأرباح

</button>

</div>

<div
id="board"
class="board">
  <div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>
<div class="cell" data-index="3"></div>

<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>
<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>

<div class="cell" data-index="8"></div>
<div class="cell" data-index="9"></div>
<div class="cell" data-index="10"></div>
<div class="cell" data-index="11"></div>

<div class="cell" data-index="12"></div>
<div class="cell" data-index="13"></div>
<div class="cell" data-index="14"></div>
<div class="cell" data-index="15"></div>

</div>

<div class="game-info">

<div class="info-item">

<span>

الحالة

</span>

<b id="status">

بانتظار البدء

</b>

</div>

<div class="info-item">

<span>

المربعات المفتوحة

</span>

<b id="opened">

0 / 16

</b>

</div>

<div class="info-item">

<span>

عدد الألغام

</span>

<b id="mineCountView">

0

</b>

</div>

<div class="info-item">

<span>

عدد النجوم

</span>

<b id="starCount">

0

</b>

</div>

</div>
<div class="actions">

<button
class="start-btn-full"
onclick="startGame()">

🎮 ابدأ الجولة

</button>

<button
class="cashout-btn"
onclick="cashOut()">

💰 سحب الأرباح

</button>

</div>

</div>

<footer class="footer">

<p>

Earn Stars © 2026

</p>

</footer>

</div>

<script src="games.js"></script>

</body>

</html>
