<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Stars</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* =========================
   عام
========================= */

body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* =========================
   كارد الرصيد
========================= */

.star-card{
  background:#1a1a2e;
  margin:15px;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.stars-box{
  font-size:22px;
  margin-top:10px;
}

/* =========================
   القائمة الرئيسية
========================= */

.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-areas:
    "mining games"
    "ads leaders"
    "withdraw withdraw";
  gap:12px;
  margin:15px;
}

.menu-img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:18px;
  display:block;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
  transition:0.2s;
}

.menu-img:active{
  transform:scale(0.97);
}

/* توزيع الكروت */

.mining{grid-area:mining;}
.games{grid-area:games;}
.ads{grid-area:ads;}
.leaders{grid-area:leaders;}

.withdraw{
  grid-area:withdraw;
  height:160px;
}

</style>
</head>

<body>

<div class="header">⭐ Earn Stars</div>

<div id="app">

    <!-- كارد الرصيد -->
    <div class="star-card">

        <h2 class="title">رصيد النجوم</h2>

        <h2 id="userName">User</h2>

        <div class="stars-box">
            ⭐ <span id="starsCount">0</span>
        </div>

    </div>

    <!-- القائمة -->
    <div class="menu-grid">

        <img src="1782489572846.png" class="menu-img mining" onclick="openMining()">

        <img src="1782489631217.png" class="menu-img games" onclick="openGames()">

        <img src="1782489809478.png" class="menu-img ads" onclick="openAds()">

        <img src="1782489961499.png" class="menu-img leaders" onclick="openLeaders()">

        <img src="1782490032975.png" class="menu-img withdraw" onclick="openWithdraw()">

    </div>

</div>

</body>
</html>
