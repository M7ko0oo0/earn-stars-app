<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Stars</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
background:#050816;
font-family:sans-serif;
color:white;
}

.header{
text-align:center;
padding:13px;
font-size:20px;
background:#0b1023;
}

/* الصفحات */
.page{
display:none;
padding:20px;
}

.page.active{
display:block;
}

/* الصفحة الرئيسية */
.star-card{
width:90%;
height:200px;
margin:20px auto;
border-radius:20px;
background-image:url("./1782246911197.png");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.star-card::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.5);
}

.stars-box{
margin-top:10px;
font-size:26px;
color:gold;
font-weight:bold;
}

/* الشبكة */
.menu-grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-areas:
"mining withdraw"
"ads leaders"
"games games";
gap:15px;
margin-top:25px;
}

.mining{ grid-area:mining; height:140px; }
.withdraw{ grid-area:withdraw; height:140px; }
.ads{ grid-area:ads; height:140px; }
.leaders{ grid-area:leaders; height:140px; }
.games{ grid-area:games; height:160px; }

.menu-img{
width:100%;
height:100%;
display:block;
border-radius:20px;
object-fit:cover;
cursor:pointer;
transition:.2s;
}

.menu-img:hover{
transform:scale(1.05);
}

/* لعبة */
.game-box{
width:90%;
margin:20px auto;
background:#0b1023;
border-radius:20px;
text-align:center;
cursor:pointer;
overflow:hidden;
}

.game-box img{
width:100%;
height:160px;
object-fit:cover;
}

</style>
</head>

<body>

<div class="header">⭐ Earn Stars</div>

<!-- HOME -->
<div id="homePage" class="page active">

<div class="star-card">
<h2>رصيد النجوم</h2>
<h2>User</h2>
<div class="stars-box">⭐ 0</div>
</div>

<div class="menu-grid">

<img src="1782489572846.png" class="menu-img mining" onclick="openPage('miningPage')">

<img src="1782489631217.png" class="menu-img withdraw" onclick="openPage('withdrawPage')">

<img src="1782489809478.png" class="menu-img ads" onclick="openPage('adsPage')">

<img src="1782489961499.png" class="menu-img leaders" onclick="openPage('leadersPage')">

<img src="1782490032975.png" class="menu-img games" onclick="openPage('gamesPage')">

</div>

</div>

<!-- MINING -->
<div id="miningPage" class="page">
<h2 style="text-align:center">Mining</h2>
</div>

<!-- WITHDRAW -->
<div id="withdrawPage" class="page">
<h2 style="text-align:center">Withdraw</h2>
</div>

<!-- ADS -->
<div id="adsPage" class="page">
<h2 style="text-align:center">Ads</h2>
</div>

<!-- LEADERS -->
<div id="leadersPage" class="page">
<h2 style="text-align:center">Leaders</h2>
</div>

<!-- GAMES -->
<div id="gamesPage" class="page">

<h2 style="text-align:center">🎮 Games</h2>

<div class="game-box" onclick="openMines()">
<img src="1782489809478.png">
<h3>لعبة الالغام</h3>
</div>

</div>

<script>

function openPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
}

function openMines(){
  window.location.href = "games.html";
}

</script>

</body>
</html>
