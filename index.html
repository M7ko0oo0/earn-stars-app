<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Stars</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
background:#050816;
font-family:sans-serif;
color:white;
}

.header{
text-align:center;
padding:13px;
font-size:20px;
background:#0b1023;
}

#app{
padding:20px;
}

/* ⭐ STAR CARD */
.star-card{
width:90%;
height:200px;
margin:20px auto;
border-radius:20px;

background-image:url("./1782246911197.png");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

position:relative;
overflow:hidden;
}

.star-card::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.5);
}

.star-card h2,
.stars-box{
position:relative;
z-index:1;
}

.stars-box{
margin-top:10px;
font-size:26px;
color:gold;
font-weight:bold;
}

/* ===== القائمة الرئيسية (تعديل فقط هنا) ===== */

.menu-grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-areas:
"mining games"
"ads leaders"
"withdraw withdraw";

gap:15px;
margin-top:25px;

/* 🔥 التعديل الوحيد */
grid-auto-rows: 140px;
}

/* ربط الأماكن */
.mining{ grid-area:mining; }
.games{ grid-area:games; }
.ads{ grid-area:ads; }
.leaders{ grid-area:leaders; }
.withdraw{ grid-area:withdraw; }

/* ===== الصور (تعديل بسيط فقط) ===== */

.menu-img{
width:100%;
height:100%;
display:block;
border-radius:20px;
cursor:pointer;
transition:.2s;
box-shadow:0 0 12px rgba(0,0,0,.35);
object-fit:cover;
}

.menu-img:hover{
transform:scale(1.03);
}

/* ===== الشريط السفلي ===== */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#0b1023;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,.08);
}

.bottom-nav button{
background:none;
border:none;
color:#cfcfcf;
display:flex;
flex-direction:column;
align-items:center;
font-size:11px;
}

.bottom-nav i{
font-size:20px;
margin-bottom:3px;
}

.bottom-nav button.active{
color:#ffd54a;
}

.ads,
.leaders{
    margin-top: -45px;
}

</style>
</head>

<body>

<div class="header">⭐ Earn Stars</div>

<div id="app">

<div class="star-card">
<h2 class="title">رصيد النجوم</h2>
<h2 id="userName">User</h2>
<div class="stars-box">⭐ <span id="starsCount">0</span></div>
</div>

<div class="menu-grid">

<img src="1782489572846.png" class="menu-img mining" onclick="openGames()">
<img src="1782489631217.png" class="menu-img games" onclick="openMining()">
<img src="1782489809478.png" class="menu-img ads" onclick="openAds()">
<img src="1782489961499.png" class="menu-img leaders" onclick="openLeaders()">
<img src="1782490032975.png" class="menu-img withdraw" onclick="openWithdraw()">

</div>

</div>

</body>
</html>
