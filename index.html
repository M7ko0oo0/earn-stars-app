<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earn Stars</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  ⭐ Earn Stars
</div>

<div class="card">
  <h2>Your Balance</h2>
  <div id="balance">0 Stars</div>
</div>

<button onclick="earn()">+ Earn Stars</button>

<div class="card">
  <h3>Daily Missions</h3>
  <p>✔ Login daily</p>
  <p>✔ Click earn button</p>
  <p>✔ Complete tasks</p>
</div>

<div class="card">
  <h3>Level</h3>
  <div id="level">Level 1</div>
</div>

<script src="script.js"></script>
</body>
</html>
