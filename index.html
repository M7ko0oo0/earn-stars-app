<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⭐ Earn Stars ULTRA SPACE</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* ================= BODY ================= */
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
}

/* 🌌 REAL SPACE IMAGE */
body{
  background:url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564') no-repeat center center fixed;
  background-size:cover;
}

/* 🌑 DARK OVERLAY */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

/* ⭐ STARS */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:0.7;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

/* ================= MAIN PANEL ================= */
.page{
  position:fixed;
  bottom:70px;
  left:10px;
  right:10px;
  padding:12px;
  border-radius:18px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,0.15);
  color:white;
}

/* ================= CARDS ================= */
.card{
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  background:rgba(0,0,0,0.4);
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* ================= BUTTONS (SMALL) ================= */
button{
  width:100%;
  padding:8px;
  border:none;
  border-radius:10px;
  background:gold;
  font-weight:bold;
  font-size:13px;
}

/* ================= NAV BAR ================= */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;

  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,0.1);
}

.nav div{
  flex:1;
  text-align:center;
  padding:12px;
  color:white;
  font-size:14px;
}

.nav div:active{
  color:gold;
}

</style>
</head>

<body>

<!-- 🌑 OVERLAY -->
<div id="overlay"></div>

<!-- ⭐ STARS GENERATOR -->
<script>
for(let i=0;i<100;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(Math.random()*10+3)+"s";
  document.body.appendChild(s);
}
</script>

<!-- ================= UI ================= -->
<div class="page">

  <div class="card">👤 الملف الشخصي</div>
  <div class="card">⭐ النجوم: 0</div>

  <div class="grid">

    <div class="card">
      🎮 ألعاب
      <button>ابدأ</button>
    </div>

    <div class="card">
      ⛏ تعدين
      <button>تشغيل</button>
    </div>

    <div class="card">
      🎁 مهمات
      <button>عرض</button>
    </div>

    <div class="card">
      📺 إعلان
      <button>ربح</button>
    </div>

  </div>

</div>

<!-- ================= NAV ================= -->
<div class="nav">
  <div>🏠</div>
  <div>🎮</div>
  <div>🎁</div>
  <div>⛏</div>
</div>

</body>
  </html>
