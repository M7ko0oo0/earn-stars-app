<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Earn Stars</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

html,body{
height:100%;
overflow:hidden;
background:#050505;
color:white;
}

/* خلفية الفضاء */

.space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;

background:url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1200")
center center;
background-size:cover;
}

/* النجوم */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.8;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-100px);
}

100%{
transform:translateY(120vh);
}

}

/* الهيدر */

.header{

height:65px;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

color:#ffd700;

border-bottom:1px solid rgba(255,0,0,.3);

background:rgba(0,0,0,.65);

backdrop-filter:blur(10px);

}

/* الصفحة */

.page{

position:fixed;

top:65px;
bottom:80px;

left:0;
right:0;

overflow:auto;

padding:15px;

}

.page::-webkit-scrollbar{
display:none;
}

/* بطاقة */

.card{

background:rgba(10,10,10,.92);

border:1px solid rgba(255,0,0,.25);

border-radius:18px;

padding:15px;

margin-bottom:12px;

box-shadow:
0 0 15px rgba(255,0,0,.10);

}

/* الرصيد */

.balance{

text-align:center;

padding:25px;

}

.balance h1{

color:#ffd700;

font-size:38px;

margin-top:10px;

}

.balance p{

color:#aaa;

margin-top:5px;

}

/* شبكة */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}

/* ازرار الصفحة */

.box{

background:#111;

border:1px solid rgba(255,0,0,.3);

border-radius:16px;

padding:18px;

text-align:center;

font-size:16px;

font-weight:bold;

transition:.2s;

}

.box:active{

transform:scale(.96);

border-color:red;

}

/* السفلي */

.nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:80px;

background:#090909;

border-top:1px solid rgba(255,0,0,.3);

display:flex;

}

.navBtn{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

font-size:13px;

font-weight:bold;

}

.active{

color:#ff2d2d;

}

.gold{

color:#ffd700;

}

</style>
</head>

<body>

<div class="space"></div>

<div class="header">
⭐ Earn Stars
</div>

<div class="page">

<div class="card balance">

<div>رصيدك الحالي</div>

<h1 id="stars">
0.0000
</h1>

<p>
Telegram Stars
</p>

</div>

<div class="grid">

<div class="box">
🎁
<br><br>
المهمات
</div>

<div class="box">
📺
<br><br>
الإعلانات
</div>

<div class="box">
🎮
<br><br>
الألعاب
</div>

<div class="box">
🏆
<br><br>
المتصدرون
</div>

</div>

</div>

<div class="nav">

<div class="navBtn active">
🏠
الرئيسية
</div>

<div class="navBtn">
⭐
اربح
</div>

<div class="navBtn">
🎮
الألعاب
</div>

<div class="navBtn">
👤
الملف
</div>

</div>

<script>

for(let i=0;i<100;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"%";

star.style.animationDuration=
(Math.random()*10+5)+"s";

document.body.appendChild(star);

}

</script>
<div id="profilePage" style="display:none;">

<div class="card">
<h2>👤 الملف الشخصي</h2>
</div>

<div class="card">
الاسم:
<span id="userName">Guest</span>
</div>

<div class="card">
المعرف:
<span id="userId">0</span>
</div>

<div class="card">
⭐ النجوم:
<span id="userStars">0</span>
</div>

<div class="card">
👥 الإحالات:
<span>0</span>
</div>

</div> 
  
</body>
</html>
