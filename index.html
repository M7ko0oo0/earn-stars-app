<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⭐ Earn Stars PRO MAX</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

html,body{
  height:100%;
  overflow:hidden;
}

/* ================= SPACE BACKGROUND ================= */
body{
  background:url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa') no-repeat center center fixed;
  background-size:cover;
}

/* ================= DARK OVERLAY ================= */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.72);
  z-index:-1;
}

/* ================= STARS ================= */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:0.7;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

/* ================= HEADER ================= */
header{
  text-align:center;
  padding:14px;
  color:gold;
  font-size:18px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

/* ================= PAGES ================= */
.page{
  position:fixed;
  top:60px;
  bottom:70px;
  left:10px;
  right:10px;
  overflow:auto;
  padding:10px;
}

/* ================= CARDS ================= */
.card{
  background:rgba(0,0,0,0.45);
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  color:white;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* ================= BUTTON ================= */
button{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,215,0,0.4);
  background:rgba(255,215,0,0.12);
  color:gold;
}

/* ================= NAV ================= */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.75);
}

.nav div{
  flex:1;
  text-align:center;
  padding:12px;
  color:white;
}

/* ================= MINES GAME ================= */
.mine-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:10px;
}

.mine{
  aspect-ratio:1;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,215,0,0.2);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:white;
}

.mine.open{
  background:rgba(0,255,0,0.2);
}

.mine.bomb{
  background:rgba(255,0,0,0.3);
}

</style>
</head>

<body>

<div class="overlay"></div>

<header>⭐ Earn Stars PRO MAX</header>

<!-- STARS -->
<script>
for(let i=0;i<120;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(Math.random()*10+3)+"s";
  document.body.appendChild(s);
}
</script>

<!-- HOME -->
<div class="page" id="home">

  <div class="card">⭐ الرصيد: <span id="stars">0</span></div>

  <div class="grid">

    <div class="card">
      🎮 لعبة
      <button onclick="game()">ابدأ</button>
    </div>

    <div class="card">
      ⛏ تعدين
      <button onclick="mine()">+0.0005</button>
    </div>

  </div>

  <!-- MINES GAME -->
  <div class="card">
    💣 Mines Game

    <p>الألغام:</p>
    <input id="minesCount" type="number" value="3" min="1" max="11">

    <p>الرهان:</p>
    <input id="bet" type="number" value="1" min="1">

    <button onclick="startGame()">ابدأ اللعبة</button>
    <button onclick="cashOut()">💰 سحب</button>

    <p>📈 المضاعف: <span id="multi">1</span>x</p>

    <div id="mineGrid" class="mine-grid"></div>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">🏠</div>
</div>

<script>

let stars = 0;

/* MINES */
let mines=[];
let opened=[];
let gameOn=false;
let multiplier=1;
let bet=1;

function update(){
  document.getElementById("stars").innerText = stars.toFixed(4);
  document.getElementById("multi").innerText = multiplier.toFixed(2);
}

/* GAME SIMPLE */
function game(){
  stars += (Math.random()>0.5)?1:-0.5;
  update();
}

/* MINE */
function mine(){
  stars += 0.0005;
  update();
}

/* START MINES */
function startGame(){

  let count = parseInt(document.getElementById("minesCount").value);
  bet = parseFloat(document.getElementById("bet").value);

  if(stars < bet){
    alert("رصيدك لا يكفي");
    return;
  }

  stars -= bet;

  mines=[];
  opened=[];
  multiplier=1;
  gameOn=true;

  let grid=document.getElementById("mineGrid");
  grid.innerHTML="";

  for(let i=0;i<12;i++){
    let box=document.createElement("div");
    box.className="mine";

    box.onclick=()=>openBox(i,box);

    grid.appendChild(box);
  }

  while(mines.length<count){
    let r=Math.floor(Math.random()*12);
    if(!mines.includes(r)) mines.push(r);
  }

  update();
}

/* OPEN BOX */
function openBox(i,box){

  if(!gameOn || opened.includes(i)) return;

  if(mines.includes(i)){
    box.classList.add("bomb");
    box.innerHTML="💣";
    gameOn=false;
    multiplier=0;
    alert("💥 خسرت");
  }else{
    box.classList.add("open");
    box.innerHTML="⭐";
    opened.push(i);
    multiplier += 0.4;
  }

  update();
}

/* CASHOUT */
function cashOut(){

  if(!gameOn) return alert("ابدأ لعبة");

  if(opened.length < 3){
    return alert("لازم 3 فتحات على الأقل");
  }

  let win = bet * multiplier;
  stars += win;

  gameOn=false;

  alert("💰 ربحت: " + win.toFixed(3));

  update();
}

update();

</script>

</body>
</html>
