<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stars App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
radial-gradient(circle at top,#2a0000 0%,#0a0000 30%,#050505 100%);
color:white;
padding-bottom:100px;
min-height:100vh;
overflow-x:hidden;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,0,0,.15),transparent 25%),
radial-gradient(circle at 80% 60%,rgba(255,0,0,.12),transparent 20%),
radial-gradient(circle at 50% 90%,rgba(255,0,0,.18),transparent 30%);
pointer-events:none;
}

body::after{
content:"";
position:fixed;
bottom:-180px;
left:50%;
transform:translateX(-50%);
width:450px;
height:450px;
border-radius:50%;
background:
radial-gradient(circle,#ff1a1a 0%,#600000 50%,transparent 75%);
box-shadow:
0 0 120px rgba(255,0,0,.6),
0 0 250px rgba(255,0,0,.3);
pointer-events:none;
}
}

.header{
padding:15px;
background:#111;
border-bottom:1px solid #222;
text-align:center;
font-size:20px;
font-weight:bold;
}

.page{
display:none;
padding:15px;
}

.page.active{
display:block;
}

.profile{
background:linear-gradient(180deg,#250000,#0f0f0f);
border:1px solid #ff2b2b;
border-radius:20px;
padding:20px;
text-align:center;
margin-top:10px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:#333;
margin:auto;
border:3px solid red;
}

.name{
font-size:22px;
margin-top:10px;
}

.balance{
font-size:40px;
color:gold;
margin-top:10px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:15px;
}

.card{
background:#151515;
border:1px solid #ff2b2b;
border-radius:15px;
padding:20px;
text-align:center;
cursor:pointer;
}

.card span{
font-size:30px;
display:block;
margin-bottom:10px;
}

.list{
margin-top:15px;
}

.item{
background:#151515;
border:1px solid #333;
padding:15px;
margin-bottom:10px;
border-radius:12px;
display:flex;
justify-content:space-between;
}

.withdraw-box{
background:#151515;
border-radius:15px;
padding:15px;
margin-top:15px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
background:#222;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:red;
color:white;
font-size:16px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #333;
}

.nav-btn{
text-align:center;
cursor:pointer;
font-size:14px;
}

.active-nav{
color:red;
}
</style>
</head>
<body>

<div class="header">
⭐ Stars App
</div>

<!-- الصفحة الرئيسية -->

<div id="home" class="page active">

<div class="profile">
<div class="avatar"></div>
<div class="name">User</div>
<div class="balance">125 ⭐</div>
</div>

<div class="cards">

<div class="card">
<span>🎮</span>
الألعاب
</div>

<div class="card">
<span>🎁</span>
المهام
</div>

<div class="card">
<span>⛏️</span>
التعدين
</div>

<div class="card">
<span>👥</span>
الإحالات
</div>

</div>

</div>

<!-- الألعاب -->

<div id="games" class="page">

<h2>🎮 الألعاب</h2>

<div class="list">

<div class="item">
<span>💣 لعبة الألغام</span>
<span>▶</span>
</div>

<div class="item">
<span>🎲 الحظ</span>
<span>▶</span>
</div>

<div class="item">
<span>🎯 العجلة</span>
<span>▶</span>
</div>

</div>

</div>

<!-- المتصدرين -->

<div id="leaders" class="page">

<h2>🏆 المتصدرين</h2>

<div class="list">

<div class="item">
<span>#1 Ali</span>
<span>2500⭐</span>
</div>

<div class="item">
<span>#2 Ahmed</span>
<span>2100⭐</span>
</div>

<div class="item">
<span>#3 Mohammed</span>
<span>1900⭐</span>
</div>

</div>

</div>

<!-- السحب -->

<div id="withdraw" class="page">

<h2>💸 سحب النجوم</h2>

<div class="withdraw-box">

<input type="number" placeholder="عدد النجوم">

<button>سحب إلى Telegram</button>

</div>

</div>

<!-- القائمة السفلية -->

<div class="bottom-nav">

<div class="nav-btn active-nav"
onclick="showPage('home',this)">
🏠<br>الرئيسية
</div>

<div class="nav-btn"
onclick="showPage('games',this)">
🎮<br>الألعاب
</div>

<div class="nav-btn"
onclick="showPage('leaders',this)">
🏆<br>المتصدرين
</div>

<div class="nav-btn"
onclick="showPage('withdraw',this)">
💸<br>السحب
</div>

</div>

<script>

function showPage(page,btn){

document
.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document
.getElementById(page)
.classList.add("active");

document
.querySelectorAll(".nav-btn")
.forEach(b=>b.classList.remove("active-nav"));

btn.classList.add("active-nav");

}

</script>

</body>
</html>
