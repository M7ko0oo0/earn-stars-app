<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Earn Stars PRO MAX</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#05070f;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  background:#0b0f1c;
  color:gold;
  font-size:20px;
  border-bottom:1px solid #222;
}

/* PAGES */
.page{
  display:none;
  padding:10px;
  height:calc(100vh - 120px);
  overflow:auto;
}
.active{display:block}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  border:1px solid #2a2a2a;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin-bottom:8px;
  background:#121a2c;
  border-radius:10px;
  border:1px solid #2b3a55;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:gold;
  font-weight:bold;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#0b0f1c;
  border-top:1px solid #222;
}

.nav div{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
}

.nav div.active{
  color:gold;
}
</style>
</head>

<body>

<header>⭐ Earn Stars PRO MAX</header>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">👤 الاسم: <span id="name"></span></div>
  <div class="card">⭐ النجوم: <span id="stars">0</span></div>
  <div class="card">🔥 المستوى: <span id="level">1</span></div>

  <div class="grid">
    <div class="card">
      🎮 لعبة
      <button onclick="game()">ابدأ</button>
    </div>

    <div class="card">
      ⛏ تعدين
      <button onclick="mine()">تعدين</button>
    </div>
  </div>
</div>

<!-- TASKS -->
<div id="tasks" class="page">
  <div class="card">🎁 مهمات يومية</div>

  <div class="task">
    <span>📢 قناة</span>
    <button onclick="task(3)">+3</button>
  </div>

  <div class="task">
    <span>👀 فيديو</span>
    <button onclick="task(2)">+2</button>
  </div>

  <div class="task">
    <span>🔗 رابط</span>
    <button onclick="task(1)">+1</button>
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <div class="card">🛒 متجر المكافآت</div>

  <div class="task">
    <span>💎 50 نجمة</span>
    <button onclick="buy(50)">شراء</button>
  </div>

  <div class="task">
    <span>💎 100 نجمة</span>
    <button onclick="buy(100)">شراء</button>
  </div>
</div>

<!-- STATS -->
<div id="stats" class="page">
  <div class="card">📊 الإحصائيات</div>
  <div class="card">عدد الألعاب: <span id="gcount">0</span></div>
  <div class="card">عدد المهمات: <span id="tcount">0</span></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('tasks')">🎁</div>
  <div onclick="show('shop')">🛒</div>
  <div onclick="show('stats')">📊</div>
</div>

<script>

/* TELEGRAM */
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user || {id:"0", first_name:"Guest"};

/* FIREBASE CONFIG (ضعه انت) */
const firebaseConfig = {
  apiKey:"XXX",
  projectId:"XXX",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* STATE */
let uid = String(user.id);

/* LOAD USER */
async function load(){
  let ref = db.collection("users").doc(uid);
  let doc = await ref.get();

  if(!doc.exists){
    await ref.set({
      name:user.first_name,
      stars:0,
      level:1,
      games:0,
      tasks:0,
      lastMine:0
    });
  }

  update();
}

/* UPDATE */
async function update(){
  let doc = await db.collection("users").doc(uid).get();
  let d = doc.data();

  document.getElementById("name").innerText = d.name;
  document.getElementById("stars").innerText = d.stars;
  document.getElementById("level").innerText = d.level;
  document.getElementById("gcount").innerText = d.games;
  document.getElementById("tcount").innerText = d.tasks;
}

/* SHOW PAGE */
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* GAME */
async function game(){
  let ref = db.collection("users").doc(uid);
  let d = (await ref.get()).data();

  d.games++;

  if(Math.random()>0.5) d.stars += 1;
  else d.stars -= 0.5;

  await ref.set(d);
  update();
}

/* MINE DAILY */
async function mine(){
  let ref = db.collection("users").doc(uid);
  let d = (await ref.get()).data();

  let now = Date.now();
  let day = 86400000;

  if(now - d.lastMine > day){
    d.stars += 0.0005;
    d.lastMine = now;
  }

  await ref.set(d);
  update();
}

/* TASK */
async function task(val){
  let ref = db.collection("users").doc(uid);
  let d = (await ref.get()).data();

  d.tasks++;
  d.stars += val;

  await ref.set(d);
  update();
}

/* BUY */
async function buy(c){
  let ref = db.collection("users").doc(uid);
  let d = (await ref.get()).data();

  if(d.stars >= c){
    d.stars -= c;
    alert("تم الشراء");
  } else {
    alert("رصيدك ضعيف");
  }

  await ref.set(d);
  update();
}

load();

</script>

</body>
</html>
