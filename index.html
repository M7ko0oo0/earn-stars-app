<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Stars</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
background:#050816;
font-family:sans-serif;
color:white;
}

.header{
text-align:center;
padding:13px;
font-size:20px;
background:#0b1023;
}

#app{
padding:20px;
padding-bottom:90px;
}

/* ⭐ STAR CARD */
.star-card{
width:90%;
height:200px;
margin:20px auto;
border-radius:20px;

background-image:url("./1782246911197.png");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

position:relative;
overflow:hidden;
}

.star-card::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.5);
}

.star-card h2,
.stars-box{
position:relative;
z-index:1;
}

.stars-box{
margin-top:10px;
font-size:26px;
color:gold;
font-weight:bold;
}

/* ===== الشبكة (بعد التبديل) ===== */

.menu-grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-areas:
"mining withdraw"
"ads leaders"
"games games";

gap:15px;
margin-top:25px;
}

/* ربط العناصر */
.mining{ grid-area:mining; height:140px; }
.games{ grid-area:games; height:160px; }
.ads{ grid-area:ads; height:140px; }
.leaders{ grid-area:leaders; height:140px; }

.withdraw{ grid-area:withdraw; height:140px; }

/* الصور */
.menu-img{
width:100%;
height:100%;
display:block;
border-radius:20px;
cursor:pointer;
transition:.2s;
object-fit:cover;
box-shadow:0 0 12px rgba(0,0,0,.35);
}

.menu-img:hover{
transform:scale(1.05);
}

/* ===== الشريط السفلي ===== */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#0b1023;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,.08);
}

.bottom-nav button{
background:none;
border:none;
color:#cfcfcf;
display:flex;
flex-direction:column;
align-items:center;
font-size:11px;
cursor:pointer;
}

.bottom-nav i{
font-size:20px;
margin-bottom:3px;
}

.bottom-nav button.active{
color:#ffd54a;
}

</style>
</head>

<body>

<div class="header">⭐ Earn Stars</div>

<div id="app">

<div class="star-card">
<h2 class="title">رصيد النجوم</h2>
<h2 id="userName">User</h2>
<div class="stars-box">⭐ <span id="starsCount">0</span></div>
</div>

<div class="menu-grid">
  
<img src="1782489572846.png" class="menu-img mining" onclick="openPage('miningPage')">

<img src="1782489631217.png" class="menu-img withdraw" onclick="openPage('withdrawPage')">

<img src="1782489809478.png" class="menu-img ads" onclick="openPage('adsPage')">

<img src="1782489961499.png" class="menu-img leaders" onclick="openPage('leadersPage')">

<img src="1782490032975.png" class="menu-img games" onclick="openPage('gamesPage')">

</div>

</div>

  <script>
function changePage(callback){
    document.body.classList.add("fade-out");

    setTimeout(function(){
        callback();
    },250);
}
    <div id="homePage">

<!-- كل محتواك الحالي يبقى HOME بدون تغيير -->

</div>

<!-- MINING -->
<div id="miningPage" style="display:none;">
<h2 style="text-align:center">Mining</h2>
</div>

<!-- WITHDRAW -->
<div id="withdrawPage" style="display:none;">
<h2 style="text-align:center">Withdraw</h2>
</div>

<!-- ADS -->
<div id="adsPage" style="display:none;">
<h2 style="text-align:center">Ads</h2>
</div>

<!-- LEADERS -->
<div id="leadersPage" style="display:none;">
<h2 style="text-align:center">Leaders</h2>
</div>

<!-- GAMES -->
<div id="gamesPage" style="display:none;">

<h2 style="text-align:center">🎮 Games</h2>

<div style="width:90%;margin:20px auto;background:#0b1023;
border-radius:20px;text-align:center;cursor:pointer"
onclick="openMines()">

<img src="1782489809478.png"
style="width:100%;height:160px;object-fit:cover;border-radius:20px">

<h3>لعبة الالغام</h3>

</div>

</div>
    
  </script>
  
</body>
</html>
